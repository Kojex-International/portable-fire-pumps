<svg width="1600" height="700" viewBox="0 0 1600 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Relay pumping for long-distance water delivery</title>
  <desc id="desc">A clean schematic showing a water source, a main pump, three relay pumps, hose routing uphill, and a nozzle operator at the top.</desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAF6FB"/>
      <stop offset="100%" stop-color="#DCEFF7"/>
    </linearGradient>

    <linearGradient id="water" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6FD3F5"/>
      <stop offset="100%" stop-color="#2FA9D6"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>

    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#111827"/>
    </marker>

    <style>
      .label-title { font: 700 28px Inter, Arial, sans-serif; fill: #111827; }
      .label-sub { font: 500 18px Inter, Arial, sans-serif; fill: #475569; }
      .pump-text { font: 700 20px Inter, Arial, sans-serif; fill: #111827; }
      .small-text { font: 600 16px Inter, Arial, sans-serif; fill: #334155; }
      .section-text { font: 700 22px Inter, Arial, sans-serif; fill: #111827; }
      .water-text { font: 700 18px Inter, Arial, sans-serif; fill: #0F172A; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="700" fill="url(#sky)"/>

  <text x="80" y="84" class="label-title">Relay Pumping for Long-Distance Water Delivery</text>
  <text x="80" y="118" class="label-sub">Concept illustration showing staged pumps transferring water uphill from a remote source.</text>

